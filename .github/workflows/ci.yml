name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install types-cffi
    
    - name: Lint with ruff
      run: ruff check .
    
    - name: Type check with mypy
      run: mypy axengine
    
    - name: Test with pytest
      run: pytest --cov=axengine --cov-report=term-missing
